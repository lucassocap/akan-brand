<!DOCTYPE html>
<html lang="es-MX">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evaluación AKAN — 2 minutos, confidencial</title>
<meta name="description" content="Evaluación médica confidencial en 2 minutos. Un médico con cédula revisa tu caso y recibes tu tratamiento en tu puerta.">
<meta property="og:title" content="Evaluación AKAN — 2 minutos, confidencial">
<meta property="og:image" content="assets/premium/og_akan_light.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════════════════════
   AKAN FUNNEL 2.0 — patrón Keeps adaptado a México
   Diagnóstico → perfil → lead → matching → pre-aprobado →
   2 planes con cadencia → checkout con re-aseguramiento
   ════════════════════════════════════════════════════════ */
:root{
  --paper:#FAF6EC; --paper-deep:#F1EADA; --card:#FFFEFA; --sand:#DCCFB4;
  --sage:#E7F0E6; --mint:#CFE7D6;
  --forest:#1F3D2E; --emerald:#2E6B4D; --jade:#3E8E68;
  --ink:#1B1812; --ink-soft:#57503F;
  --clay:#C5623E; --copper:#E07B4C; --gold:#C9A876; --peach:#F2C9A8;
  --grad-cta:linear-gradient(135deg,#C5623E 0%,#E07B4C 100%);
  --grad-text:linear-gradient(110deg,#1F3D2E 0%,#3E8E68 55%,#C9A876 110%);
  --line:rgba(27,24,18,.12);
  --r-md:18px; --r-lg:26px; --r-pill:100px;
  --font-d:'Fraunces',serif; --font-b:'Hanken Grotesk',sans-serif;
  --ease:cubic-bezier(.16,1,.3,1);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-b);background:var(--paper);color:var(--ink);
  -webkit-font-smoothing:antialiased;font-size:17px;line-height:1.55;min-height:100svh}
::selection{background:var(--clay);color:var(--paper)}
a{color:inherit;text-decoration:none}
img{max-width:100%;display:block}
.serif-i{font-family:var(--font-d);font-style:italic;font-weight:600}
.grad-text{background:var(--grad-text);-webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent;color:transparent}

.bar{position:fixed;top:0;left:0;right:0;z-index:50;background:rgba(250,246,236,.85);
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-bottom:1px solid var(--line)}
.bar-in{max-width:720px;margin:0 auto;display:flex;align-items:center;gap:14px;padding:13px 20px}
.logo{font-family:var(--font-d);font-weight:700;font-size:21px;color:var(--forest);letter-spacing:.04em}
.back{width:38px;height:38px;border-radius:50%;border:1.5px solid var(--line);background:var(--card);
  display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .25s var(--ease);
  visibility:hidden;flex-shrink:0}
.back:hover{border-color:var(--ink)}
.back svg{width:17px;height:17px;stroke:var(--ink)}
.progress{flex:1;height:7px;background:var(--paper-deep);border-radius:5px;overflow:hidden}
.progress div{height:100%;width:0%;background:linear-gradient(90deg,var(--jade),var(--emerald));
  border-radius:5px;transition:width .5s var(--ease)}
.conf-chip{display:flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;color:var(--jade);
  letter-spacing:.06em;text-transform:uppercase;flex-shrink:0}
.conf-chip svg{width:13px;height:13px;stroke:var(--jade)}

.stage{max-width:720px;margin:0 auto;padding:106px 20px 70px;position:relative}
.screen{display:none;animation:enter .5s var(--ease)}
.screen.on{display:block}
@keyframes enter{from{opacity:0;transform:translateY(26px)}to{opacity:1;transform:none}}
.q-overline{font-size:12.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
  color:var(--clay);margin-bottom:14px}
.q-title{font-family:var(--font-d);font-weight:700;letter-spacing:-.025em;line-height:1.1;
  font-size:clamp(28px,6.2vw,42px);margin-bottom:10px}
.q-sub{color:var(--ink-soft);font-size:16px;margin-bottom:30px}

.opts{display:flex;flex-direction:column;gap:13px}
.opts.grid2{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.opt{display:flex;align-items:center;gap:16px;background:var(--card);border:1.5px solid var(--line);
  border-radius:var(--r-md);padding:19px 20px;cursor:pointer;text-align:left;width:100%;
  font-family:var(--font-b);font-size:16.5px;font-weight:600;color:var(--ink);
  transition:all .22s var(--ease);-webkit-tap-highlight-color:transparent}
.opt:active{transform:scale(.985)}
.opt:hover{border-color:var(--jade);box-shadow:0 10px 28px rgba(120,90,50,.1)}
.opt.sel{border-color:var(--jade);background:var(--sage)}
.opt .glyph{width:46px;height:46px;border-radius:50%;background:var(--sage);border:1px solid var(--mint);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  font-family:var(--font-d);font-style:italic;font-weight:600;font-size:19px;color:var(--forest)}
.opt .glyph.warm{background:#FBEADF;border-color:var(--peach);color:var(--clay)}
.opt small{display:block;font-weight:400;color:var(--ink-soft);font-size:13.5px;margin-top:2px}
.opt .tick{margin-left:auto;width:22px;height:22px;border-radius:50%;border:2px solid var(--sand);
  flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s}
.opt.sel .tick{background:var(--jade);border-color:var(--jade)}
.opt.sel .tick::after{content:"✓";color:#fff;font-size:12px;font-weight:700}
.opt .thumb{width:64px;height:64px;border-radius:12px;object-fit:cover;flex-shrink:0}
/* tarjetas visuales (coronillas) */
.visual-card{display:flex;flex-direction:column;padding:0;overflow:hidden;text-align:center;gap:0}
.visual-card img{width:100%;aspect-ratio:1;object-fit:cover}
.visual-card span{padding:13px 10px;font-size:15px}
.helper{display:block;text-align:center;margin-top:20px;font-size:14.5px;color:var(--ink-soft);
  text-decoration:underline;text-underline-offset:3px;cursor:pointer;background:none;border:none;
  width:100%;font-family:var(--font-b)}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:10px;font-family:var(--font-b);
  font-weight:600;font-size:16.5px;padding:17px 36px;border-radius:var(--r-pill);border:none;
  cursor:pointer;transition:all .3s var(--ease);-webkit-tap-highlight-color:transparent}
.btn:hover{transform:translateY(-2px)}
.btn:active{transform:scale(.98)}
.btn-cta{background:var(--grad-cta);color:#FFF7EC;box-shadow:0 10px 30px rgba(197,98,62,.32);width:100%}
.btn-cta:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none}
.btn-ghost{background:transparent;color:var(--ink);border:1.5px solid rgba(27,24,18,.25);width:100%}
.next-wrap{margin-top:26px;display:none}
.next-wrap.show{display:block}

/* perfil (análisis completo) */
.profile-box{background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);
  padding:8px 26px;margin:26px 0}
.pr-row{display:flex;justify-content:space-between;gap:16px;padding:15px 0;
  border-bottom:1px solid var(--line);font-size:15.5px}
.pr-row:last-child{border-bottom:none}
.pr-row .k{color:var(--ink-soft)}
.pr-row .v{font-weight:700;text-align:right}
.pr-checks{display:flex;flex-direction:column;gap:12px;margin:24px 0 8px}
.pr-checks div{display:flex;gap:10px;align-items:center;font-size:15.5px;font-weight:600}
.pr-checks svg{width:19px;height:19px;stroke:var(--jade);flex-shrink:0}

/* lead form + checkout form */
.form{display:flex;flex-direction:column;gap:14px;margin-top:8px}
.f-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.field label{display:block;font-size:13px;font-weight:700;letter-spacing:.04em;color:var(--ink-soft);
  margin-bottom:7px;text-transform:uppercase}
.field input,.field select{width:100%;padding:15px 16px;border-radius:14px;border:1.5px solid var(--line);
  background:var(--card);font-family:var(--font-b);font-size:16px;color:var(--ink);
  transition:border-color .2s;-webkit-appearance:none;appearance:none}
.field input:focus,.field select:focus{outline:none;border-color:var(--jade)}
.field input.err{border-color:var(--clay);background:#FDF1EA}
.priv-note{display:flex;gap:10px;align-items:flex-start;font-size:13.5px;color:var(--ink-soft);
  background:var(--sage);border:1px solid var(--mint);border-radius:var(--r-md);padding:14px 16px}
.priv-note svg{width:16px;height:16px;stroke:var(--jade);flex-shrink:0;margin-top:2px}

/* loader matching */
.match-bar{height:12px;background:var(--paper-deep);border-radius:8px;overflow:hidden;margin:30px 0 10px}
.match-bar div{height:100%;width:0%;background:var(--grad-cta);border-radius:8px;transition:width .3s linear}
.match-pct{text-align:center;font-family:var(--font-d);font-weight:700;font-size:19px;color:var(--clay)}
.match-list{display:flex;flex-direction:column;gap:16px;margin-top:30px}
.match-item{display:flex;gap:12px;align-items:center;font-size:16px;font-weight:600;opacity:.35;
  transition:opacity .4s var(--ease)}
.match-item.done{opacity:1}
.match-item .dot{width:24px;height:24px;border-radius:50%;border:2px solid var(--sand);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;transition:all .3s}
.match-item.done .dot{background:var(--jade);border-color:var(--jade)}
.match-item.done .dot::after{content:"✓";color:#fff;font-size:12px;font-weight:700}

/* resultado pre-aprobado */
.compare{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:28px 0}
.cmp-cell{background:var(--card);border:1px solid var(--line);border-radius:var(--r-md);
  overflow:hidden;text-align:center}
.cmp-cell img{width:100%;aspect-ratio:1;object-fit:cover}
.cmp-cell .lab{padding:11px;font-size:13.5px;font-weight:700}
.cmp-cell .tag{display:inline-block;font-size:11.5px;font-weight:700;padding:4px 12px;
  border-radius:var(--r-pill);margin-top:6px}
.stat-band{background:var(--sage);border:1px solid var(--mint);border-radius:var(--r-md);
  padding:18px 22px;display:flex;align-items:center;gap:16px;margin:24px 0}
.stat-band b{font-family:var(--font-d);font-size:34px;color:var(--forest);letter-spacing:-.02em}
.stat-band span{font-size:14.5px;color:var(--ink-soft)}

/* plan compare cards */
.plan-cards{display:flex;flex-direction:column;gap:18px;margin-top:26px}
.pcard{background:var(--card);border:1.5px solid var(--line);border-radius:var(--r-lg);padding:28px 24px;position:relative}
.pcard.rec{border-color:var(--clay);box-shadow:0 22px 54px rgba(197,98,62,.14)}
.pcard .tags{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.pcard .tag{font-size:12px;font-weight:700;padding:5px 13px;border-radius:var(--r-pill);
  background:var(--paper-deep);color:var(--ink-soft)}
.pcard .tag.hot{background:#F7E8B8;color:#7A5B17}
.pcard h3{font-family:var(--font-d);font-weight:700;font-size:24px;letter-spacing:-.01em}
.pcard .for{font-size:14px;color:var(--ink-soft);margin:4px 0 16px}
.pcard ul{list-style:none;display:flex;flex-direction:column;gap:9px;margin-bottom:20px}
.pcard li{display:flex;gap:9px;font-size:14.5px;color:var(--ink-soft);align-items:flex-start}
.pcard li::before{content:"✓";color:var(--jade);font-weight:700;flex-shrink:0}
.cadence{display:flex;flex-direction:column;gap:10px;margin-bottom:18px}
.cad{display:flex;align-items:center;gap:12px;border:1.5px solid var(--line);border-radius:14px;
  padding:14px 16px;cursor:pointer;transition:all .2s;background:var(--paper)}
.cad.sel{border-color:var(--clay);background:#FDF4ED}
.cad .radio{width:20px;height:20px;border-radius:50%;border:2px solid var(--sand);flex-shrink:0;
  display:flex;align-items:center;justify-content:center}
.cad.sel .radio{border-color:var(--clay)}
.cad.sel .radio::after{content:"";width:10px;height:10px;border-radius:50%;background:var(--clay)}
.cad .cl{flex:1;font-size:15px;font-weight:600}
.cad .cl small{display:block;font-weight:400;font-size:12.5px;color:var(--ink-soft)}
.cad .pr{font-weight:700;font-size:16px;text-align:right}
.cad .pr s{color:var(--ink-soft);font-weight:400;font-size:13px;margin-right:5px}
.cad .save{display:inline-block;background:#DCEFE2;color:#1F6B40;font-size:11.5px;font-weight:700;
  padding:3px 10px;border-radius:var(--r-pill);margin-top:3px}
.pcard .cancel-note{text-align:center;font-size:12.5px;color:var(--ink-soft);margin-top:12px}

/* checkout */
.order-summary{background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);
  padding:24px;margin-bottom:22px}
.os-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;
  padding-bottom:16px;border-bottom:1px solid var(--line);margin-bottom:6px}
.os-head .n{font-family:var(--font-d);font-weight:700;font-size:19px}
.os-head .day{text-align:right;font-size:12.5px;color:var(--ink-soft)}
.os-head .day b{display:block;font-family:var(--font-d);font-size:19px;color:var(--clay)}
.os-row{display:flex;justify-content:space-between;gap:14px;padding:11px 0;font-size:14.5px;
  border-bottom:1px solid var(--line)}
.os-row:last-of-type{border-bottom:none}
.os-row .free{color:#1F6B40;font-weight:700}
.os-row s{color:var(--ink-soft);margin-right:6px}
.os-total{display:flex;justify-content:space-between;padding-top:14px;margin-top:6px;
  border-top:2px solid var(--ink);font-weight:700;font-size:17px}
.guarantee{display:flex;gap:12px;background:#F7E8B8;border-radius:var(--r-md);padding:15px 17px;
  font-size:13.5px;color:#7A5B17;font-weight:600;margin-top:16px;align-items:center}
.guarantee svg{width:22px;height:22px;stroke:#7A5B17;flex-shrink:0}

/* gate + éxito */
.gate{background:#FBEADF;border:1.5px solid var(--peach);border-radius:var(--r-lg);padding:28px 26px}
.gate h3{font-family:var(--font-d);font-size:24px;margin-bottom:10px;color:var(--clay)}
.gate p{font-size:15.5px;color:var(--ink-soft)}
.success-icon{width:84px;height:84px;border-radius:50%;background:var(--sage);border:1.5px solid var(--mint);
  display:flex;align-items:center;justify-content:center;margin:0 auto 26px;
  animation:pop .6s cubic-bezier(.34,1.56,.64,1)}
@keyframes pop{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}
.success-icon svg{width:38px;height:38px;stroke:var(--jade)}
.timeline{margin-top:34px;display:flex;flex-direction:column;border-left:2px solid var(--mint);
  margin-left:10px;padding-left:24px;gap:22px;text-align:left}
.tl-item{position:relative}
.tl-item::before{content:"";position:absolute;left:-31px;top:5px;width:12px;height:12px;border-radius:50%;
  background:var(--jade)}
.tl-item.dim::before{background:var(--sand)}
.tl-item b{display:block;font-size:15.5px}
.tl-item span{font-size:14px;color:var(--ink-soft)}
.order-ref{font-family:var(--font-d);font-weight:700;font-size:21px;color:var(--forest);
  background:var(--sage);border:1px solid var(--mint);border-radius:var(--r-pill);
  display:inline-flex;padding:10px 26px;margin-top:8px}
.trust-row{display:flex;gap:18px;justify-content:center;flex-wrap:wrap;margin-top:34px;
  color:var(--ink-soft);font-size:13px;font-weight:600}
.trust-row span{display:flex;align-items:center;gap:7px}
.trust-row svg{width:14px;height:14px;stroke:var(--jade)}

.sprite{position:fixed;pointer-events:none;z-index:0;opacity:.45;
  filter:drop-shadow(0 14px 22px rgba(120,90,50,.12))}
.sprite img{width:100%}
.s-float{animation:sFloat 13s ease-in-out infinite}
.s-sway{animation:sSway 15s ease-in-out infinite;transform-origin:bottom center}
@keyframes sFloat{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-22px) rotate(4deg)}}
@keyframes sSway{0%,100%{transform:rotate(-6deg)}50%{transform:rotate(5deg)}}
.stage>*{position:relative;z-index:2}
@media(prefers-reduced-motion:reduce){.s-float,.s-sway{animation:none}.screen{animation:none}}
</style>
</head>
<body>

<div class="sprite s-sway" style="top:14%;left:-18px;width:84px"><img src="assets/elements/leaf_eucalyptus.png" alt=""></div>
<div class="sprite s-float" style="top:34%;right:-12px;width:58px"><img src="assets/elements/bubble_amber.png" alt=""></div>
<div class="sprite s-float" style="bottom:8%;left:5%;width:42px;animation-delay:3s"><img src="assets/elements/drop_gold.png" alt=""></div>

<div class="bar">
  <div class="bar-in">
    <button class="back" id="backBtn" aria-label="Atrás"><svg viewBox="0 0 24 24" fill="none" stroke-width="2.4" stroke-linecap="round"><path d="M19 12H5M11 6l-6 6 6 6"/></svg></button>
    <a class="logo" href="index.html">AKAN</a>
    <div class="progress"><div id="progFill"></div></div>
    <div class="conf-chip"><svg viewBox="0 0 24 24" fill="none" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>Confidencial</div>
  </div>
</div>

<div class="stage"><div id="screens"></div></div>

<script>
const API_BASE = localStorage.getItem('AKAN_API') || 'http://localhost:8070';
let apiOnline = false;
fetch(API_BASE + '/akan/api/health', {signal: AbortSignal.timeout(3500)})
  .then(r=>r.json()).then(j=>{apiOnline = !!j.ok}).catch(()=>{apiOnline=false});

const PLANS = {
  'AKAN-ESENCIAL': {name:'Plan Esencial', price:549, branch:'pelo',
    items:['Finasteride 1mg oral diario','Consulta médica incluida','Seguimiento por chat ilimitado','Envío discreto mensual'],
    for:'Frenar la caída desde la raíz', tags:['Más accesible','Prevención']},
  'AKAN-COMPLETO': {name:'Plan Completo', price:849, branch:'pelo',
    items:['Finasteride 1mg oral','Minoxidil tópico 5%','Consulta + seguimiento médico','Envío discreto mensual'],
    for:'Frenar la caída y recuperar densidad', tags:['Más efectivo','Recuperación','Doble vía']},
  'AKAN-KIT': {name:'Kit AKAN Total', price:1199, branch:'pelo',
    items:['Finasteride + Minoxidil 5%','Shampoo Ketoconazol 2%','Suplemento Biotina + Zinc','Seguimiento prioritario'],
    for:'El protocolo completo, máximo resultado', tags:['Máximo resultado','Protocolo completo']},
  'AKAN-SILD': {name:'Plan Momento', price:449, branch:'desempeno',
    items:['Sildenafil 50mg — 8 dosis','Actúa en 30-60 min','Consulta médica incluida','Envío discreto mensual'],
    for:'Para cuando tú decidas', tags:['Más accesible','A demanda']},
  'AKAN-TADA': {name:'Plan Diario', price:649, branch:'desempeno',
    items:['Tadalafil 5mg — 30 días','Siempre listo, sin planear','Consulta médica incluida','Envío discreto mensual'],
    for:'Espontaneidad total, todos los días', tags:['Más efectivo','Espontáneo']},
  'AKAN-KITCONF': {name:'Kit Confianza', price:899, branch:'desempeno',
    items:['Tadalafil 5mg diario','Suplemento energía y circulación','Seguimiento prioritario','Envío discreto mensual'],
    for:'El paquete completo de desempeño', tags:['Protocolo completo','Energía']},
  'AKAN-CONSULTA': {name:'Consulta Médica de Valoración', price:0, branch:'ambas',
    items:['Videollamada con médico con cédula','Valoración completa y confidencial','Plan personalizado seguro','Sin costo, sin compromiso'],
    for:'Tu caso necesita valoración personalizada', tags:['Gratis','Recomendado para ti']}
};
const CONSULTA_PRECIO = 350;

/* ── Flujo declarativo ── */
const FLOW = {
  start:{type:'q', overline:'Evaluación AKAN · 2 minutos', title:'¿Qué quieres resolver?',
    sub:'100% confidencial — solo tu médico ve tus respuestas.',
    opts:[
      {g:'P', t:'Mi pelo', s:'Caída, entradas, menos densidad', next:'p1', set:{branch:'pelo'}},
      {g:'D', t:'Mi desempeño', s:'Erección, rendimiento, seguridad', next:'d1', set:{branch:'desempeno'}},
    ]},

  /* ── PELO ── */
  p1:{type:'q', overline:'Tu meta · 1 de 8', title:'¿Cuál es tu meta?',
    opts:[
      {g:'R', t:'Recuperar lo perdido', next:'p2', ans:['Meta','Recuperar'], set:{goal:'Recuperar'}},
      {g:'C', t:'Conservar lo que tengo', next:'p2', ans:['Meta','Conservar'], set:{goal:'Conservar'}},
      {g:'+', t:'Las dos cosas', next:'p2', ans:['Meta','Recuperar y conservar'], set:{goal:'Recuperar y conservar'}},
    ]},
  p2:{type:'visual', overline:'Tu etapa · 2 de 8', title:'¿Cuál se parece más a ti?',

const S = {branch:null, answers:[], flags:{}, plan:null, cadence:'3m', leadId:null, lead:{}, history:[]};

function recommend(){
  if(S.branch==='pelo'){
    let rec, alt;
    const p=S.flags.prio||'mid';
    if(p==='low'){rec='AKAN-ESENCIAL';alt='AKAN-COMPLETO'}
    else if(p==='max'){rec='AKAN-KIT';alt='AKAN-COMPLETO'}
    else{rec='AKAN-COMPLETO';alt='AKAN-ESENCIAL'}
    if(S.flags.format==='Tópico'&&rec==='AKAN-ESENCIAL'){rec='AKAN-COMPLETO';alt='AKAN-ESENCIAL'}
    return [rec,alt];
  }else{
    const p=S.flags.prio||'momento';
    if(p==='diario')return ['AKAN-TADA','AKAN-KITCONF'];
    if(p==='kit')return ['AKAN-KITCONF','AKAN-TADA'];
    return ['AKAN-SILD','AKAN-TADA'];
  }
}

const price3m=p=>Math.round(p*0.85);

const screens=document.getElementById('screens');
const progFill=document.getElementById('progFill');
const backBtn=document.getElementById('backBtn');
const ORDER={start:2,p1:8,p2:16,p3:24,p4:32,p5:40,p5b:44,p6:50,p7:58,p8:66,
  d1:12,d2:24,d3:36,d4:48,d5:60,profile:72,lead:80,match:88,result:92,checkout:96,done:100};

function setProgress(id){
  progFill.style.width=(ORDER[id]||4)+'%';
  backBtn.style.visibility = S.history.length>0 && !['done','match'].includes(id) ? 'visible' : 'hidden';
}
function el(html){const d=document.createElement('div');d.innerHTML=html.trim();return d.firstChild}
function show(id, push=true){
  if(push && screens.dataset.current) S.history.push(screens.dataset.current);
  screens.dataset.current=id;
  screens.innerHTML='';
  let node=null;
  if(id==='profile')node=renderProfile();
  else if(id==='lead')node=renderLead();
  else if(id==='match')node=renderMatch();
  else if(id==='result')node=renderResult();
  else if(id==='checkout')node=renderCheckout();
  else if(id!=='done')node=renderFlow(id);
  if(node)screens.appendChild(node);
  setProgress(id);
  scrollTo({top:0,behavior:'instant'});
}
backBtn.addEventListener('click',()=>{const prev=S.history.pop();if(prev)show(prev,false)});

function renderFlow(id){
  const def=FLOW[id];
  if(def.type==='gate')return renderGate(def);
  const isVisual=def.type==='visual';
  const scr=el(`<div class="screen on">
    <div class="q-overline">${def.overline||''}</div>
    <h1 class="q-title">${def.title}</h1>
    ${def.sub?`<p class="q-sub">${def.sub}</p>`:''}
    <div class="opts${isVisual?' grid2':''}"></div>
    <div class="next-wrap"><button class="btn btn-cta">Continuar →</button></div>
  </div>`);
  const optsBox=scr.querySelector('.opts');
  const nextWrap=scr.querySelector('.next-wrap');

  if(def.type==='q'||isVisual){
    def.opts.forEach(o=>{
      const b=isVisual
        ? el(`<button class="opt visual-card"><img src="${o.img}" alt="${o.t}" loading="lazy"><span>${o.t}</span></button>`)
        : el(`<button class="opt">${o.g?`<span class="glyph">${o.g}</span>`:''}${o.thumb?`<img class="thumb" src="${o.thumb}" alt="">`:''}
          <span>${o.t}${o.s?`<small>${o.s}</small>`:''}</span><span class="tick"></span></button>`);
      b.addEventListener('click',()=>{
        optsBox.querySelectorAll('.opt').forEach(x=>x.classList.remove('sel'));
        b.classList.add('sel');
        if(o.ans)S.answers=S.answers.filter(a=>a.q!==o.ans[0]).concat([{q:o.ans[0],a:o.ans[1]}]);
        if(o.set)Object.assign(S.flags,o.set);
        if(o.set&&o.set.branch)S.branch=o.set.branch;
        setTimeout(()=>show(o.next),260);
      });
      optsBox.appendChild(b);
    });
  }

  if(def.type==='multi'){
    const state=new Set();
    const nextBtn=nextWrap.querySelector('button');
    def.opts.forEach(o=>{
      const b=el(`<button class="opt">${o.hard?'<span class="glyph warm">!</span>':''}
        <span>${o.t}</span><span class="tick"></span></button>`);
      b.addEventListener('click',()=>{
        if(o.none){state.clear();state.add('none');
          optsBox.querySelectorAll('.opt').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');
        }else{state.delete('none');optsBox.querySelector('.opt:last-child').classList.remove('sel');
          if(state.has(o.t)){state.delete(o.t);b.classList.remove('sel')}
          else{state.add(o.t);b.classList.add('sel')}}
        nextWrap.classList.toggle('show',state.size>0);
      });
      optsBox.appendChild(b);
    });
    nextBtn.addEventListener('click',()=>{
      const sel=[...state].filter(x=>x!=='none');
      S.answers=S.answers.filter(a=>a.q!==def.ansKey)
        .concat([{q:def.ansKey,a:sel.length?sel.join('; '):'Ninguna'}]);
      const hard=def.opts.some(o=>o.hard&&sel.includes(o.t));
      const flag=def.opts.some(o=>o.flag&&sel.includes(o.t));
      if(hard&&def.nextHard)show(def.nextHard);
      else if(flag&&def.nextFlag)show(def.nextFlag);
      else show(def.nextOk);
    });
  }
  return scr;
}

function renderGate(def){
  const scr=el(`<div class="screen on">
    <div class="gate"><h3>${def.title}</h3><p>${def.body}</p></div>
    <div style="margin-top:24px"></div></div>`);
  const box=scr.lastElementChild;
  if(def.consulta){
    S.plan='AKAN-CONSULTA';S.flags.gated=true;
    const b=el(`<button class="btn btn-cta">Agendar consulta gratis →</button>`);
    b.addEventListener('click',()=>show('lead'));
    box.appendChild(b);
  }
  return scr;
}

        </div>
        <div class="field"><label>Fecha de nacimiento</label><input name="birthdate" type="date" max="2010-12-31"></div>
      </div>
      <div class="priv-note">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        <span><b>Confidencial de verdad:</b> tus respuestas solo las ve tu médico. Ni la farmacia, ni nadie más, tiene acceso.</span>
      </div>
      <button class="btn btn-cta" type="submit">Ver mi plan →</button>
    </form>
  </div>`);
  scr.querySelector('form').addEventListener('submit',async e=>{
    e.preventDefault();
    const form=e.target;
    const f=Object.fromEntries(new FormData(form).entries());
    let valid=true;
    ['name','phone','email','birthdate'].forEach(k=>{
      const inp=form.querySelector(`[name=${k}]`);
      const ok=k==='email'?/.+@.+\..+/.test(f[k]):(f[k]||'').trim().length>1;
      inp.classList.toggle('err',!ok);if(!ok)valid=false;
    });
    if(!valid)return;
    const age=(Date.now()-new Date(f.birthdate).getTime())/3.15576e10;
    if(age<18){
      screens.innerHTML='';screens.appendChild(el(`<div class="screen on"><div class="gate">

    if(apiOnline){
      try{
        const r=await fetch(API_BASE+'/akan/api/lead',{method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({branch:S.branch||'pelo',name:f.name,email:f.email,phone:f.phone,
            state:f.state,birthdate:f.birthdate,profile:S.answers}),
          signal:AbortSignal.timeout(8000)});
        const j=await r.json();if(j.ok)S.leadId=j.lead_id;
      }catch(e){}
    }
    show(S.flags.gated?'checkout':'match');
  });
  return scr;
}

      </div>
      <button class="btn ${isRec?'btn-cta':'btn-ghost'}">Continuar al checkout →</button>
      <div class="cancel-note">Cambia o cancela cuando quieras · El médico confirma antes de enviar</div>
    </div>`;
  };

  const scr=el(`<div class="screen on">
    <div class="q-overline">Tu plan está listo</div>
    <h1 class="q-title">${first}, estás <span class="serif-i grad-text">pre-aprobado.</span></h1>
    <p class="q-sub">Tu médico con cédula confirma tu receta hoy mismo. Si no procede, no pagas nada.</p>
    ${compare}${stat}
    <div class="plan-cards">${card(recCode,true)}${card(altCode,false)}</div>
  </div>`);
  scr.querySelectorAll('.pcard').forEach(pc=>{
    pc.querySelectorAll('.cad').forEach(c=>{
      c.addEventListener('click',()=>{
        pc.querySelectorAll('.cad').forEach(x=>x.classList.remove('sel'));
        c.classList.add('sel');
      });
    });
    pc.querySelector('.btn').addEventListener('click',()=>{
      S.plan=pc.dataset.code;
      S.cadence=pc.querySelector('.cad.sel').dataset.cad;
      show('checkout');
    });
  });
  return scr;
}

/* ── Checkout (dirección + resumen estilo Keeps) ── */
function renderCheckout(){
  const p=PLANS[S.plan];
  const is3m=S.cadence==='3m'&&p.price>0;
  const mensual=is3m?price3m(p.price):p.price;
  const totalHoy=is3m?mensual*3:mensual;
  const perDay=p.price>0?Math.ceil(mensual/30):0;
  const haveLead=!!S.lead.name;
  const summary=`<div class="order-summary">
    <div class="os-head"><div><div class="n">${p.name}</div>
      <div style="font-size:13px;color:var(--ink-soft)">${p.price>0?(is3m?'Plan 3 meses · -15%':'Plan mensual'):'Valoración médica'}</div></div>
      ${p.price>0?`<div class="day">desde<b>$${perDay}/día</b></div>`:''}</div>
    <div class="os-row"><span>Consulta médica en línea</span><span class="free"><s>$${fmtMx(CONSULTA_PRECIO)}</s>GRATIS</span></div>
    <div class="os-row"><span>Envío discreto (caja neutra)</span><span class="free">GRATIS</span></div>
    ${is3m?`<div class="os-row"><span>Descuento plan 3 meses</span><span class="free">−15%</span></div>`:''}
    <div class="os-total"><span>${p.price>0?(is3m?'Total cada 3 meses':'Total mensual'):'Total'}</span><span>${p.price>0?'$'+fmtMx(totalHoy)+' MXN':'$0'}</span></div>
    <div class="guarantee"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l8 4v6c0 5-3.5 8.5-8 10-4.5-1.5-8-5-8-10V6z"/></svg>
      Garantía AKAN: hoy no pagas nada. El cobro llega por WhatsApp solo si tu médico aprueba la receta.</div>
  </div>`;
  const scr=el(`<div class="screen on">
    <div class="q-overline">Último paso</div>
    <h1 class="q-title">¿A dónde lo mandamos?</h1>
    <p class="q-sub">Caja neutra, sin marca. Ni el repartidor sabe qué lleva.</p>
    ${summary}
    <form class="form" novalidate>
      ${haveLead?'':`<div class="field"><label>Nombre completo</label><input name="name" autocomplete="name" placeholder="Carlos Mendoza"></div>
      <div class="f-row">
        <div class="field"><label>WhatsApp</label><input name="phone" type="tel" placeholder="55 1234 5678"></div>
        <div class="field"><label>Email</label><input name="email" type="email" placeholder="tu@correo.com"></div>
      </div>`}
      <div class="field"><label>Calle y número</label><input name="street" autocomplete="street-address" placeholder="Av. Ámsterdam 123, Depto 4"></div>
      <div class="f-row">
        <div class="field"><label>Ciudad</label><input name="city" placeholder="CDMX"></div>
        <div class="field"><label>C.P.</label><input name="zip" inputmode="numeric" placeholder="06100"></div>
      </div>
      ${haveLead?'':`<div class="field"><label>Estado</label>
        <select name="state"><option value="">Elige…</option><option>Ciudad de México</option><option>Estado de México</option>
        <option>Nuevo León</option><option>Jalisco</option><option>Querétaro</option><option>Puebla</option><option>Otro</option></select></div>`}
      <button class="btn btn-cta" type="submit" id="submitBtn">Confirmar mi orden →</button>
    </form>
  </div>`);
  scr.querySelector('form').addEventListener('submit',async e=>{
    e.preventDefault();
    const form=e.target;
    const f=Object.fromEntries(new FormData(form).entries());
    const cust={name:S.lead.name||f.name,email:S.lead.email||f.email,phone:S.lead.phone||f.phone,
      state:S.lead.state||f.state||'',street:f.street,city:f.city,zip:f.zip};
    let valid=true;
    const need=haveLead?['street','city','zip']:['name','phone','email','street','city','zip'];
    need.forEach(k=>{
      const inp=form.querySelector(`[name=${k}]`);if(!inp)return;
      const ok=k==='email'?/.+@.+\..+/.test(f[k]):(f[k]||'').trim().length>1;
      inp.classList.toggle('err',!ok);if(!ok)valid=false;
    });
    if(!valid)return;
    const btn=scr.querySelector('#submitBtn');btn.disabled=true;btn.textContent='Enviando…';
    const payload={branch:S.branch||'pelo',plan_code:S.plan,answers:S.answers,customer:cust,
      cadence:S.cadence,lead_id:S.leadId};
    let result=null;
    if(apiOnline){
      try{
        const r=await fetch(API_BASE+'/akan/api/checkout',{method:'POST',
          headers:{'Content-Type':'application/json'},body:JSON.stringify(payload),
          signal:AbortSignal.timeout(12000)});
        result=await r.json();
      }catch(err){result=null}
    }
    if(!result||!result.ok){
      const pend=JSON.parse(localStorage.getItem('akan_pending')||'[]');
      pend.push({...payload,ts:Date.now()});
      localStorage.setItem('akan_pending',JSON.stringify(pend));
      result={ok:true,order:'AKAN-'+String(Date.now()).slice(-6),fallback:true};
    }
    renderDone(result,cust);
  });
  return scr;
}

function renderDone(result,cust){
  screens.dataset.current='done';
  const p=PLANS[S.plan];
  const waText=encodeURIComponent(`Hola AKAN 👋 Soy ${cust.name}. Completé mi evaluación (orden ${result.order}, ${p.name}). Quedo pendiente de la revisión del médico.`);
  screens.innerHTML=`<div class="screen on" style="text-align:center">
    <div class="success-icon"><svg viewBox="0 0 24 24" fill="none" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg></div>
    <div class="q-overline">Orden recibida</div>
    <h1 class="q-title">Listo, ${cust.name.split(' ')[0]}.<br>Lo difícil <span class="serif-i grad-text">ya pasó.</span></h1>
    <div class="order-ref">${result.order}</div>
    <div class="timeline">
      <div class="tl-item"><b>Hoy — Tu médico revisa tu evaluación</b><span>Un médico con cédula valora tus respuestas. Si tiene dudas te escribe por WhatsApp.</span></div>
      <div class="tl-item dim"><b>Receta aprobada → link de pago</b><span>Te llega por WhatsApp. Hasta entonces, no pagas nada.</span></div>
      <div class="tl-item dim"><b>24-72h — En tu puerta</b><span>Caja neutra, sin marca. Confidencial de inicio a fin.</span></div>
    </div>
    <a class="btn btn-cta" style="margin-top:34px" href="https://wa.me/525500000000?text=${waText}">Abrir WhatsApp →</a>
    <div class="trust-row">
      <span><svg viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l8 4v6c0 5-3.5 8.5-8 10-4.5-1.5-8-5-8-10V6z"/></svg>Médico con cédula</span>
      <span><svg viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>100% confidencial</span>
      <span><svg viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8l-9-5-9 5v8l9 5 9-5z"/></svg>Caja sin marca</span>
    </div>
  </div>`;
  setProgress('done');
}

/* arranque — ?plan=CODE (compra directa) | ?branch= | normal */
const params=new URLSearchParams(location.search);
if(params.get('plan')&&PLANS[params.get('plan')]){
  S.plan=params.get('plan');
  S.branch=PLANS[S.plan].branch==='desempeno'?'desempeno':'pelo';
  S.cadence=params.get('cad')==='monthly'?'monthly':'3m';
  S.answers.push({q:'Origen',a:'Compra directa desde catálogo — '+S.plan});
  show('checkout',false);
}else if(params.get('branch')==='desempeno'){S.branch='desempeno';show('d1',false);}
else if(params.get('branch')==='pelo'){S.branch='pelo';show('p1',false);}
else show('start',false);
</script>
</body>
</html>
